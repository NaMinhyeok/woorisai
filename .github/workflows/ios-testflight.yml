name: iOS TestFlight
run-name: iOS ${{ inputs.marketing_version }} (${{ inputs.build_number }}) to TestFlight

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: App version in x.y.z form
        required: true
        default: "0.1.0"
        type: string
      build_number:
        description: Unique App Store Connect build number
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  source-gate:
    name: Verify trusted release source
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Require main and a valid release identity
        shell: bash
        env:
          RELEASE_MARKETING_VERSION: ${{ inputs.marketing_version }}
          RELEASE_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/main"
          [[ "${RELEASE_MARKETING_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "${RELEASE_BUILD_NUMBER}" =~ ^[1-9][0-9]*$ ]]

      - name: Require a successful Verify push run for this commit
        shell: bash
        run: |
          set -euo pipefail
          runs_file="$(mktemp)"
          jobs_file="$(mktemp)"
          trap 'rm -f "${runs_file}" "${jobs_file}"' EXIT
          gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/verify.yml/runs" \
            -f branch=main \
            -f event=push \
            -f status=success \
            -f head_sha="${GITHUB_SHA}" \
            -f per_page=100 \
            >"${runs_file}"

          verify_run_id="$(jq --raw-output --arg sha "${GITHUB_SHA}" '
            [.workflow_runs[] | select(
              .path == ".github/workflows/verify.yml" and
              .head_branch == "main" and
              .head_sha == $sha and
              .event == "push" and
              .status == "completed" and
              .conclusion == "success"
            )]
            | sort_by(.run_started_at)
            | last
            | .id // empty
          ' "${runs_file}")"
          if [ -z "${verify_run_id}" ]; then
            echo "No successful Verify push run exists for ${GITHUB_SHA}" >&2
            exit 1
          fi

          gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${verify_run_id}/jobs?per_page=100" \
            >"${jobs_file}"

          required_jobs=(
            "Repository hygiene"
            "Backend check"
            "Container smoke"
            "iOS app gates"
          )
          for job_name in "${required_jobs[@]}"; do
            conclusion="$(jq --raw-output --arg name "${job_name}" '
              [.jobs[] | select(.name == $name)]
              | sort_by(.completed_at)
              | last
              | .conclusion // "missing"
            ' "${jobs_file}")"
            if [ "${conclusion}" != "success" ]; then
              echo "Required Verify job is not successful: ${job_name} (${conclusion})" >&2
              exit 1
            fi
          done

  testflight:
    name: Archive and upload
    needs: source-gate
    environment: ios-testflight
    runs-on: macos-26
    timeout-minutes: 90
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
    steps:
      - name: Check out trusted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Restore protected release inputs and upload the archive
        shell: bash
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          FIREBASE_RELEASE_PLIST_BASE64: ${{ secrets.FIREBASE_RELEASE_PLIST_BASE64 }}
          FIREBASE_RELEASE_REALM_SHA256: ${{ secrets.FIREBASE_RELEASE_REALM_SHA256 }}
          FIREBASE_DEBUG_REALM_SHA256: ${{ secrets.FIREBASE_DEBUG_REALM_SHA256 }}
          WOORISAI_API_HOST: ${{ secrets.WOORISAI_API_HOST }}
          RELEASE_MARKETING_VERSION: ${{ inputs.marketing_version }}
          RELEASE_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail
          umask 077

          required_names=(
            ASC_KEY_P8_BASE64
            ASC_KEY_ID
            ASC_ISSUER_ID
            FIREBASE_RELEASE_PLIST_BASE64
            FIREBASE_RELEASE_REALM_SHA256
            FIREBASE_DEBUG_REALM_SHA256
            WOORISAI_API_HOST
          )
          for required_name in "${required_names[@]}"; do
            if [ -z "${!required_name:-}" ]; then
              echo "Missing GitHub repository secret: ${required_name}" >&2
              exit 1
            fi
          done

          [[ "${ASC_KEY_ID}" =~ ^[A-Z0-9]{10}$ ]] || {
            echo "ASC_KEY_ID must be 10 uppercase letters or digits" >&2
            exit 1
          }
          [[ "${ASC_ISSUER_ID}" =~ ^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$ ]] || {
            echo "ASC_ISSUER_ID must be a UUID" >&2
            exit 1
          }
          [[ "${FIREBASE_RELEASE_REALM_SHA256}" =~ ^[0-9A-Fa-f]{64}$ ]] || {
            echo "FIREBASE_RELEASE_REALM_SHA256 must be a SHA-256 digest" >&2
            exit 1
          }
          [[ "${FIREBASE_DEBUG_REALM_SHA256}" =~ ^[0-9A-Fa-f]{64}$ ]] || {
            echo "FIREBASE_DEBUG_REALM_SHA256 must be a SHA-256 digest" >&2
            exit 1
          }
          api_host_re='^([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?$'
          api_host_lower="$(printf '%s' "${WOORISAI_API_HOST}" | tr '[:upper:]' '[:lower:]')"
          if [[ ! "${WOORISAI_API_HOST}" =~ ${api_host_re} ]] || \
            [[ "${api_host_lower}" == *.invalid ]]; then
            echo "WOORISAI_API_HOST must be a production DNS hostname without a scheme or path" >&2
            exit 1
          fi
          unset api_host_lower
          release_realm_digest="$(/usr/bin/printf '%s' "${FIREBASE_RELEASE_REALM_SHA256}" | \
            /usr/bin/tr '[:upper:]' '[:lower:]')"
          debug_realm_digest="$(/usr/bin/printf '%s' "${FIREBASE_DEBUG_REALM_SHA256}" | \
            /usr/bin/tr '[:upper:]' '[:lower:]')"
          if [ "${release_realm_digest}" = "${debug_realm_digest}" ]; then
            echo "Release and debug Firebase realm digests must differ" >&2
            exit 1
          fi

          release_input_dir="$(mktemp -d "${RUNNER_TEMP}/woorisai-ios-release.XXXXXX")"
          trap 'rm -rf "${release_input_dir}"' EXIT
          asc_key_path="${release_input_dir}/AuthKey_${ASC_KEY_ID}.p8"
          firebase_plist_path="${release_input_dir}/GoogleService-Info.plist"
          release_env_path="${release_input_dir}/.env.production"

          printf '%s' "${ASC_KEY_P8_BASE64}" | /usr/bin/base64 -D >"${asc_key_path}"
          printf '%s' "${FIREBASE_RELEASE_PLIST_BASE64}" | /usr/bin/base64 -D >"${firebase_plist_path}"
          chmod 600 "${asc_key_path}" "${firebase_plist_path}"

          {
            printf 'WOORISAI_API_HOST=%s\n' "${WOORISAI_API_HOST}"
            printf 'WOORISAI_FIREBASE_RELEASE_CONFIG_PATH=%s\n' "${firebase_plist_path}"
            printf 'WOORISAI_FIREBASE_RELEASE_REALM_SHA256=%s\n' "${FIREBASE_RELEASE_REALM_SHA256}"
            printf 'WOORISAI_FIREBASE_DEBUG_REALM_SHA256=%s\n' "${FIREBASE_DEBUG_REALM_SHA256}"
            printf 'APP_STORE_CONNECT_KEY_PATH=%s\n' "${asc_key_path}"
            printf 'APP_STORE_CONNECT_KEY_ID=%s\n' "${ASC_KEY_ID}"
            printf 'APP_STORE_CONNECT_ISSUER_ID=%s\n' "${ASC_ISSUER_ID}"
            printf 'IOS_MARKETING_VERSION=%s\n' "${RELEASE_MARKETING_VERSION}"
            printf 'IOS_BUILD_NUMBER=%s\n' "${RELEASE_BUILD_NUMBER}"
          } >"${release_env_path}"
          chmod 600 "${release_env_path}"

          unset \
            ASC_KEY_P8_BASE64 \
            ASC_KEY_ID \
            ASC_ISSUER_ID \
            FIREBASE_RELEASE_PLIST_BASE64 \
            FIREBASE_RELEASE_REALM_SHA256 \
            FIREBASE_DEBUG_REALM_SHA256 \
            WOORISAI_API_HOST
          unset release_realm_digest debug_realm_digest

          apps/ios/scripts/release-testflight.zsh \
            --env-file "${release_env_path}" \
            --marketing-version "${RELEASE_MARKETING_VERSION}" \
            --build-number "${RELEASE_BUILD_NUMBER}"
