			shellScript = "set -eu\nfirebase_bundle_path=\"${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GoogleService-Info.plist\"\nfirebase_config_path=\"\"\nfirebase_expected_realm_sha256=\"\"\nfirebase_other_realm_sha256=\"\"\nfirebase_config_is_explicit=false\nfirebase_is_release_archive=false\nfirebase_configuration_required=false\nrm -f \"${firebase_bundle_path}\"\n\nif [ \"${CONFIGURATION}\" = \"Release\" ] && [ \"${ACTION}\" = \"install\" ]; then\n  firebase_is_release_archive=true\nfi\nif [ \"${PLATFORM_NAME}\" = \"iphoneos\" ] || [ \"${firebase_is_release_archive}\" = true ]; then\n  firebase_configuration_required=true\nfi\n\ncase \"${CONFIGURATION}\" in\n  Debug)\n    if [ -n \"${WOORISAI_FIREBASE_DEBUG_CONFIG_PATH:-}\" ]; then\n      firebase_config_path=\"${WOORISAI_FIREBASE_DEBUG_CONFIG_PATH}\"\n      firebase_config_is_explicit=true\n    fi\n    firebase_expected_realm_sha256=\"${WOORISAI_FIREBASE_DEBUG_REALM_SHA256:-}\"\n    firebase_other_realm_sha256=\"${WOORISAI_FIREBASE_RELEASE_REALM_SHA256:-}\"\n    ;;\n  Release)\n    if [ -n \"${WOORISAI_FIREBASE_RELEASE_CONFIG_PATH:-}\" ]; then\n      firebase_config_path=\"${WOORISAI_FIREBASE_RELEASE_CONFIG_PATH}\"\n      firebase_config_is_explicit=true\n    else\n      firebase_config_path=\"${SRCROOT}/Woorisai/Resources/GoogleService-Info.plist\"\n    fi\n    firebase_expected_realm_sha256=\"${WOORISAI_FIREBASE_RELEASE_REALM_SHA256:-}\"\n    firebase_other_realm_sha256=\"${WOORISAI_FIREBASE_DEBUG_REALM_SHA256:-}\"\n    ;;\n  *)\n    echo \"error: Unsupported build configuration for Firebase client configuration.\"\n    exit 1\n    ;;\nesac\n\nif [ -z \"${firebase_config_path}\" ]; then\n  if [ \"${firebase_configuration_required}\" = true ]; then\n    echo \"error: Firebase Apple client configuration is required for a device build.\"\n    exit 1\n  fi\n  exit 0\nfi\n\nif [ ! -f \"${firebase_config_path}\" ]; then\n  if [ \"${firebase_config_is_explicit}\" = true ] || [ \"${firebase_configuration_required}\" = true ]; then\n    echo \"error: Required Firebase Apple client configuration is unavailable.\"\n    exit 1\n  fi\n  exit 0\nfi\n\nif [ -z \"${firebase_expected_realm_sha256}\" ]; then\n  if [ \"${firebase_config_is_explicit}\" = true ] || [ \"${firebase_configuration_required}\" = true ]; then\n    echo \"error: Protected Firebase realm assertion is required for this configuration.\"\n    exit 1\n  fi\n  echo \"warning: Firebase Apple client configuration was not injected because its protected realm assertion is unavailable.\"\n  exit 0\nfi\n\nif ! /usr/bin/printf '%s' \"${firebase_expected_realm_sha256}\" \\\n  | /usr/bin/grep -Eq '^[[:xdigit:]]{64}$'; then\n  echo \"error: Protected Firebase realm assertion is malformed.\"\n  exit 1\nfi\nfirebase_expected_realm_sha256=$(\n  /usr/bin/printf '%s' \"${firebase_expected_realm_sha256}\" | /usr/bin/tr '[:upper:]' '[:lower:]'\n)\n\nif [ -n \"${firebase_other_realm_sha256}\" ]; then\n  if ! /usr/bin/printf '%s' \"${firebase_other_realm_sha256}\" \\\n    | /usr/bin/grep -Eq '^[[:xdigit:]]{64}$'; then\n    echo \"error: Protected Firebase cross-realm assertion is malformed.\"\n    exit 1\n  fi\n  firebase_other_realm_sha256=$(\n    /usr/bin/printf '%s' \"${firebase_other_realm_sha256}\" | /usr/bin/tr '[:upper:]' '[:lower:]'\n  )\n  if [ \"${firebase_expected_realm_sha256}\" = \"${firebase_other_realm_sha256}\" ]; then\n    echo \"error: Debug and Release Firebase realms must be distinct.\"\n    exit 1\n  fi\nfi\n\nif ! /usr/bin/plutil -lint \"${firebase_config_path}\" >/dev/null 2>&1; then\n  echo \"error: Firebase Apple client configuration is not a valid plist.\"\n  exit 1\nfi\nfirebase_client_bundle_id=$(/usr/libexec/PlistBuddy -c \"Print :BUNDLE_ID\" \"${firebase_config_path}\" 2>/dev/null || true)\nfirebase_google_app_id=$(/usr/libexec/PlistBuddy -c \"Print :GOOGLE_APP_ID\" \"${firebase_config_path}\" 2>/dev/null || true)\nfirebase_project_id=$(/usr/libexec/PlistBuddy -c \"Print :PROJECT_ID\" \"${firebase_config_path}\" 2>/dev/null || true)\nfirebase_api_key=$(/usr/libexec/PlistBuddy -c \"Print :API_KEY\" \"${firebase_config_path}\" 2>/dev/null || true)\nfirebase_sender_id=$(/usr/libexec/PlistBuddy -c \"Print :GCM_SENDER_ID\" \"${firebase_config_path}\" 2>/dev/null || true)\nif [ \"${firebase_client_bundle_id}\" != \"${PRODUCT_BUNDLE_IDENTIFIER}\" ] || \\\n   [ -z \"${firebase_google_app_id}\" ] || [ -z \"${firebase_project_id}\" ] || \\\n   [ -z \"${firebase_api_key}\" ] || [ -z \"${firebase_sender_id}\" ]; then\n  echo \"error: Firebase Apple client configuration is invalid for this app target.\"\n  exit 1\nfi\n\nfirebase_actual_realm_sha256=$(\n  /usr/bin/printf '%s\\0%s\\0%s\\0%s\\0%s\\0' \\\n    \"${firebase_project_id}\" \"${firebase_google_app_id}\" \"${firebase_sender_id}\" \\\n    \"${firebase_api_key}\" \"${firebase_client_bundle_id}\" \\\n    | /usr/bin/shasum -a 256 | /usr/bin/awk '{print $1}'\n)\nif [ \"${firebase_actual_realm_sha256}\" != \"${firebase_expected_realm_sha256}\" ]; then\n  echo \"error: Firebase Apple client configuration does not match the protected realm assertion.\"\n  exit 1\nfi\n\nmkdir -p \"$(dirname \"${firebase_bundle_path}\")\"\n/usr/bin/ditto \"${firebase_config_path}\" \"${firebase_bundle_path}\"\n/usr/bin/plutil -lint \"${firebase_bundle_path}\" >/dev/null\n";
