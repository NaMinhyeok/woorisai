spring:
  application:
    name: woorisai
  autoconfigure:
    exclude:
      - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    default-schema: woorisai
    schemas: woorisai
    create-schemas: true
    baseline-on-migrate: false
  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: woorisai
  jackson:
    deserialization:
      fail-on-unknown-properties: true
      accept-float-as-int: false
    mapper:
      allow-coercion-of-scalars: false
  modulith:
    detection-strategy: explicitly-annotated
    events:
      completion-mode: delete
      republish-outstanding-events-on-restart: true
  sql:
    init:
      mode: never

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-components: never
      show-details: never
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
          additional-path: "server:/health"

woorisai:
  media:
    enabled: ${MEDIA_UPLOADS_ENABLED:false}
    endpoint: ${R2_ENDPOINT_URL:}
    region: ${R2_REGION_NAME:auto}
    bucket: ${R2_BUCKET_NAME:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    upload-url-ttl-seconds: ${MEDIA_UPLOAD_URL_TTL_SECONDS:900}
    download-url-ttl-seconds: ${MEDIA_DOWNLOAD_URL_TTL_SECONDS:300}
  notification:
    firebase:
      enabled: ${FIREBASE_NOTIFICATIONS_ENABLED:false}
      project-id: ${FIREBASE_PROJECT_ID:}
      service-account-json-base64: ${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64:}
