      additionalProperties: false
      required:
        - id
        - author
        - content
        - createdAt
        - updatedAt
        - isMine
        - attachments
        - commentCount
        - comments
      properties:
        id:
          $ref: "#/components/schemas/PositiveInt64"
        author:
          $ref: "#/components/schemas/DiaryParticipant"
        content:
          type: string
          minLength: 1
          maxLength: 1000
        createdAt:
          type: string
          format: date-time
        updatedAt:
          $ref: "#/components/schemas/NullableDateTime"
        isMine:
          type: boolean
        attachments:
          $ref: "#/components/schemas/FlexibleAttachmentGroup"
        commentCount:
          type: integer
          format: int64
          minimum: 0
        comments:
          type: array
