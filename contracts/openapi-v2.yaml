        - isMine
        - attachments
        - commentCount
      properties:
        id:
          $ref: "#/components/schemas/PositiveInt64"
        author:
          $ref: "#/components/schemas/DiaryParticipant"
        content:
          type: string
          minLength: 1
          maxLength: 1000
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isMine:
          type: boolean
          enum:
            - true
        attachments:
          $ref: "#/components/schemas/FlexibleAttachmentGroup"
        commentCount:
          type: integer
          format: int64
