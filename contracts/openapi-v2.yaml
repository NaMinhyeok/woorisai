            $ref: "#/components/schemas/DiaryCommentResponse"
    DiaryCommentResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - author
        - content
        - createdAt
        - updatedAt
        - isMine
      properties:
        id:
          $ref: "#/components/schemas/PositiveInt64"
        author:
          $ref: "#/components/schemas/DiaryParticipant"
        content:
          type: string
          minLength: 1
          maxLength: 500
        createdAt:
          type: string
          format: date-time
        updatedAt:
          $ref: "#/components/schemas/NullableDateTime"
        isMine:
          type: boolean
    DiaryCommentUpdatedResponse:
